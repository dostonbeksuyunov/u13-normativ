{% extends 'base.html' %}

{% block content %}

<!-- 🖼 IMAGE (TOP) -->
<div style="text-align:center; margin-top:20px;">
    <img src="/media/books/library.jpg"
         alt="Library Image"
         style="
            width:90%;
            max-height:300px;
            object-fit:cover;
            border-radius:20px;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
         ">
</div>


<!-- TITLE + SEARCH + ADD -->
<div style="text-align:center; margin-top:20px;">

    <h1>📚 Books Library</h1>

    <form method="get">
        <input type="text" name="q" placeholder="Search books...">
        <button type="submit">Search</button>
    </form>

    <a href="{% url 'book_create' %}">
        ➕ Add Book
    </a>

</div>


<!-- BOOK LIST -->
<div style="margin-top:30px;">

    {% for book in books %}

        <div style="
            border:1px solid #ddd;
            padding:15px;
            margin:10px auto;
            width:60%;
            border-radius:10px;
            background:white;
        ">

            <h3>{{ book.title }}</h3>
            <p>✍️ {{ book.author }}</p>
            <p>${{ book.price }}</p>

            <p>{{ book.description }}</p>

            <a href="{% url 'book_detail' book.id %}">👁 Detail</a>
            <a href="{% url 'add_to_cart' book.id %}">🛒 Cart</a>
            <a href="{% url 'book_update' book.id %}">✏️ Edit</a>
            <a href="{% url 'book_delete' book.id %}">🗑 Delete</a>

        </div>

    {% endfor %}

</div>

{% endblock %}
