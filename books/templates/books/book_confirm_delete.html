{% extends 'base.html' %}

{% block content %}

<div class="text-center mt-5">

    <h2>❗ Are you sure?</h2>

    <p>
        You are deleting:
        <b>{{ book.title }}</b> by {{ book.author }}
    </p>

    <form method="post">
        {% csrf_token %}

        <button type="submit" class="btn btn-danger">
            Yes, Delete
        </button>

        <a href="{% url 'book_list' %}" class="btn btn-secondary">
            Cancel
        </a>
    </form>

</div>

{% endblock %}
