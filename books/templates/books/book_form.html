{% extends 'base.html' %}

{% block content %}

<h2 class="text-center mb-4">
    {% if form.instance.pk %}
        ✏️ Update Book
    {% else %}
        ➕ Add Book
    {% endif %}
</h2>

<div class="w-50 mx-auto">

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <div class="text-center">
            <button type="submit" class="btn btn-success">
                Save
            </button>

            <a href="{% url 'book_list' %}" class="btn btn-secondary">
                Cancel
            </a>
        </div>

    </form>

</div>

{% endblock %}
