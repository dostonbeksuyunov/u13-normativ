<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Library</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            background: #2c3e50;
        }

        .left, .right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #1abc9c;
        }

        .search input {
            padding: 6px 10px;
            border-radius: 5px;
            border: none;
            outline: none;
        }

        .content {
            padding: 20px;
        }

        .username {
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="navbar">

    <!-- LEFT -->
    <div class="left">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'book_list' %}">Books</a>
    </div>

    <!-- SEARCH -->
    <div class="search">
        <form method="get" action="{% url 'book_list' %}">
            <input type="text" name="q" placeholder="Search books...">
        </form>
    </div>

    <!-- RIGHT -->
    <div class="right">

        {% if user.is_authenticated %}

            <span class="username">👤 {{ user.username }}</span>
            <a href="{% url 'logout' %}">Logout</a>

        {% else %}

            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>

        {% endif %}

    </div>

</div>

<!-- CONTENT -->
<div class="content">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
