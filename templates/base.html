<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Library</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <style>

        *{
            box-sizing:border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            background: #2c3e50;
            flex-wrap: wrap;
        }

        .left,
        .right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: .3s;
        }

        .navbar a:hover {
            color: #1abc9c;
        }

        .search form{
            display:flex;
            gap:8px;
        }

        .search input {
            padding: 8px 12px;
            border-radius: 5px;
            border: none;
            outline: none;
            width: 220px;
        }

        .btn {
            padding: 8px 14px;
            background: #1abc9c;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            color: white;
            font-weight:bold;
            transition:.3s;
        }

        .btn:hover {
            background: #16a085;
        }

        .username {
            color: white;
            font-weight: bold;
        }

        .content {
            flex: 1;
            padding: 20px;
        }

        .footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 12px;
            margin-top: auto;
        }

        .message{
            padding:12px;
            margin-bottom:15px;
            border-radius:6px;
            font-weight:bold;
        }

        .success{
            background:#d4edda;
            color:#155724;
        }

        .error{
            background:#f8d7da;
            color:#721c24;
        }

        @media (max-width: 700px) {

            .navbar {
                flex-direction: column;
                gap: 15px;
            }

            .search input{
                width:100%;
            }

            .search form{
                width:100%;
            }
        }

    </style>
</head>

<body>

<div class="navbar">

    <div class="left">

        <a href="{% url 'home' %}">
            🏠 Home
        </a>

        <a href="{% url 'book_list' %}">
            📚 Books
        </a>

        <a href="{% url 'cart_view' %}">
            🛒 Cart
        </a>

    </div>

    <div class="search">

        <form method="get"
              action="{% url 'book_list' %}">

            <input type="text"
                   name="q"
                   placeholder="Search books...">

            <button class="btn">
                Search
            </button>

        </form>

    </div>

    <div class="right">

        {% if user.is_authenticated %}

            <span class="username">
                👤 {{ user.username }}
            </span>

            <form method="post"
                  action="{% url 'logout' %}">

                {% csrf_token %}

                <button class="btn">
                    Logout
                </button>

            </form>

        {% else %}

            <a href="{% url 'login' %}">
                Login
            </a>

            <a href="{% url 'register' %}">
                Register
            </a>

        {% endif %}

    </div>

</div>

<div class="content">

    {% if messages %}

        {% for message in messages %}

            <div class="message {{ message.tags }}">
                {{ message }}
            </div>

        {% endfor %}

    {% endif %}

    {% block content %}
    {% endblock %}

</div>

<div class="footer">

    🇺🇿 Uzbekistan |

    📅 <span id="date"></span> |

    ⏰ <span id="time"></span>

</div>

<script>

function updateTime(){

    let now = new Date();

    document.getElementById(
        "date"
    ).innerText = now.toLocaleDateString();

    document.getElementById(
        "time"
    ).innerText = now.toLocaleTimeString();
}

setInterval(updateTime,1000);

updateTime();

</script>

</body>
</html>
