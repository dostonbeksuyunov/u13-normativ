<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            background: #2c3e50;
            flex-wrap: wrap;
        }

        .left, .right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .navbar a:hover {
            color: #1abc9c;
        }

        .search input {
            padding: 6px 10px;
            border-radius: 5px;
            border: none;
            outline: none;
        }

        .btn {
            padding: 6px 10px;
            background: #1abc9c;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            color: white;
        }

        .btn:hover {
            background: #16a085;
        }

        .username {
            color: white;
            font-weight: bold;
        }

        /* CONTENT */
        .content {
            flex: 1;
            padding: 20px;
        }

        /* FOOTER */
        .footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 12px;
            margin-top: auto;
        }

        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="left">
        <a href="{% url 'home' %}">🏠 Home</a>
        <a href="{% url 'book_list' %}">📚 Books</a>
        <a href="{% url 'cart_view' %}">🛒 Cart</a>
    </div>

    <div class="search">
        <form method="get" action="{% url 'book_list' %}">
            <input type="text" name="q" placeholder="Search books...">
        </form>
    </div>

    <div class="right">

        {% if user.is_authenticated %}
            <span class="username">👤 {{ user.username }}</span>

            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button class="btn">Logout</button>
            </form>

        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}

    </div>

</div>

<!-- CONTENT -->
<div class="content">
    {% block content %}{% endblock %}
</div>

<!-- FOOTER (ONLY ONE!) -->
<div class="footer">
    🇺🇿 Uzbekistan |
    📅 <span id="date"></span> |
    ⏰ <span id="time"></span>
</div>

<script>
function updateTime(){
    let now = new Date();
    document.getElementById("date").innerText = now.toLocaleDateString();
    document.getElementById("time").innerText = now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
