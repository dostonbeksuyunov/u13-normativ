{% extends 'base.html' %}

{% block content %}

<div style="text-align:center; margin-top:40px;">
    <h1>📚 My Library System</h1>

    {% if user.is_authenticated %}
        <h2>👋 Xush kelibsiz, {{ user.first_name|default:user.username }}</h2>
    {% endif %}
</div>

<!-- CARDS -->
<div style="display:flex; justify-content:center; gap:20px; margin-top:50px;">

    <a href="{% url 'book_list' %}" style="text-decoration:none;">
        <div style="padding:20px; border:1px solid #ddd; border-radius:10px; width:150px; text-align:center;">
            <h3>📚 Books</h3>
        </div>
    </a>

    <a href="{% url 'login' %}" style="text-decoration:none;">
        <div style="padding:20px; border:1px solid #ddd; border-radius:10px; width:150px; text-align:center;">
            <h3>🔐 Auth</h3>
        </div>
    </a>

    <a href="{% url 'book_list' %}" style="text-decoration:none;">
        <div style="padding:20px; border:1px solid #ddd; border-radius:10px; width:150px; text-align:center;">
            <h3>⚡ Fast</h3>
        </div>
    </a>

</div>

<!-- 📅 FOOTER -->
<div style="position:fixed; bottom:0; left:0; width:100%; background:#2c3e50; color:white; text-align:center; padding:10px;">

    <p>🇺🇿 Uzbekistan | 📅 <span id="date"></span> | ⏰ <span id="time"></span></p>

</div>

<!-- JS for date & time -->
<script>
    function updateTime() {
        let now = new Date();

        document.getElementById("date").innerText =
            now.toLocaleDateString();

        document.getElementById("time").innerText =
            now.toLocaleTimeString();
    }

    setInterval(updateTime, 1000);
    updateTime();
</script>

{% endblock %}
